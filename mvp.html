<!DOCTYPE html>
<html lang="en">
<head>

     crossorigin="anonymous"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STAX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;700&family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4efe6;
    --ink: #1a1a1a;
    --paper: #fbf7ef;
    --shadow: rgba(20, 20, 20, 0.18);
    --grid-line: rgba(20, 20, 20, 0.06);
    --target: #7a7a7a;
    --target-soft: #b8b8b8;
    --accent: #ff4d2e;

    --c-I: #4ad6e6;
    --c-O: #f5c518;
    --c-T: #c44dd6;
    --c-S: #4ade80;
    --c-Z: #ef4444;
    --c-J: #3b82f6;
    --c-L: #fb923c;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* paper grain background */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.025) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.025) 0%, transparent 50%);
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 24px 80px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 28px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 14px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .brand h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(36px, 6vw, 64px);
    margin: 0;
    letter-spacing: -0.03em;
    font-style: italic;
  }

  .brand .sub {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    margin-top: 4px;
    color: var(--ink);
    transform: rotate(-1.5deg);
    transform-origin: left;
  }

  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-align: right;
    line-height: 1.6;
    opacity: 0.75;
  }

  .meta .puzzle-no {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  /* Three wells side by side */
  .wells {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 18px;
    align-items: start;
    margin-bottom: 24px;
  }

  /* Difficulty selector */
  .difficulty-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 22px;
    justify-content: center;
  }

  .diff-btn {
    flex: 1;
    max-width: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    background: var(--paper);
    border: 2px solid var(--ink);
    cursor: pointer;
    border-radius: 4px 6px 5px 7px / 6px 4px 7px 5px;
    box-shadow: 2px 2px 0 var(--ink);
    transition: transform 0.08s, box-shadow 0.08s, background 0.15s;
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink);
  }

  .diff-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--ink);
  }

  .diff-btn.active {
    background: var(--ink);
    color: var(--paper);
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0 var(--ink);
  }

  .diff-btn .diff-name {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .diff-btn .diff-meta {
    font-size: 9.5px;
    letter-spacing: 0.05em;
    opacity: 0.7;
    text-transform: uppercase;
    line-height: 1.2;
  }

  .well-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .well-label {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    transform: rotate(-1deg);
  }

  .well-label.queue { transform: rotate(1deg); }
  .well-label.target { transform: rotate(-0.5deg); }

  /* Hand-drawn well container */
  .well {
    position: relative;
    background: var(--paper);
    /* Wobbly hand-drawn border using filter */
    border: 3px solid var(--ink);
    border-radius: 4px 6px 5px 7px / 5px 4px 7px 6px;
    box-shadow:
      2px 3px 0 var(--ink),
      6px 8px 24px var(--shadow);
  }

  /* Subtle grid lines inside wells */
  canvas {
    display: block;
    border-radius: 2px;
    image-rendering: pixelated;
  }

  /* Queue (middle) is narrower */
  .queue-well {
    width: 80px;
  }

  /* Bottom HUD */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    padding: 16px 18px;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 4px 7px 5px 6px / 6px 4px 7px 5px;
    box-shadow: 2px 3px 0 var(--ink);
  }

  .stats {
    display: flex;
    gap: 24px;
    font-size: 13px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-label {
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-size: 10px;
    opacity: 0.6;
  }

  .stat-value {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 22px;
    line-height: 1;
  }

  .stat-value.match { color: #22c55e; }
  .stat-value.over { color: var(--accent); }

  .controls-hint {
    font-size: 11px;
    line-height: 1.6;
    text-align: right;
    opacity: 0.75;
  }

  .controls-hint kbd {
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    margin: 0 1px;
  }

  .buttons {
    display: flex;
    gap: 10px;
  }

  button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 10px 16px;
    border: 2px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    border-radius: 3px 5px 4px 6px / 5px 3px 6px 4px;
    box-shadow: 2px 2px 0 var(--ink);
    transition: transform 0.08s, box-shadow 0.08s;
  }

  button:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--ink);
  }

  button:active {
    transform: translate(2px, 2px);
    box-shadow: 0 0 0 var(--ink);
  }

  button.primary {
    background: var(--accent);
    color: var(--paper);
  }

  /* Win modal */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(20, 20, 20, 0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    backdrop-filter: blur(3px);
  }

  .modal.show { display: flex; }

  .modal-card {
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 6px 9px 7px 8px / 8px 6px 9px 7px;
    padding: 32px 40px;
    box-shadow: 4px 6px 0 var(--ink), 12px 18px 40px rgba(0,0,0,0.4);
    text-align: center;
    max-width: 400px;
    animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes pop {
    0% { transform: scale(0.7) rotate(-3deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .modal-card h2 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 900;
    font-size: 48px;
    margin: 0 0 8px;
    letter-spacing: -0.02em;
  }

  .modal-card .scribble {
    font-family: 'Caveat', cursive;
    font-size: 24px;
    margin-bottom: 18px;
    transform: rotate(-2deg);
  }

  .modal-card p {
    font-size: 13px;
    line-height: 1.6;
    margin: 0 0 20px;
  }

  /* Lose modal variant */
  .modal-card.fail h2 { color: var(--accent); }

  @media (max-width: 720px) {
    .wells {
      grid-template-columns: 1fr;
      gap: 14px;
      justify-items: center;
    }
    .queue-well { width: 60px; }
    .hud { flex-direction: column; align-items: flex-start; }
    .controls-hint { text-align: left; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <h1>stax.</h1>
      <div class="sub">a daily stacking puzzle</div>
    </div>
    <div class="meta">
      <div class="puzzle-no" id="puzzleNo">PUZZLE #001</div>
      <div id="dateLine"></div>
      <div>seed-based · same for everyone</div>
    </div>
  </header>

  <div class="difficulty-bar">
    <button class="diff-btn" data-diff="easy">
      <span class="diff-name">easy</span>
      <span class="diff-meta">8×12 · 5-6 pieces · outline</span>
    </button>
    <button class="diff-btn active" data-diff="medium">
      <span class="diff-name">medium</span>
      <span class="diff-meta">9×14 · 8-10 pieces</span>
    </button>
    <button class="diff-btn" data-diff="hard">
      <span class="diff-name">hard</span>
      <span class="diff-meta">10×16 · 12-15 · 5s peek then memory</span>
    </button>
  </div>

  <section class="wells">
    <div class="well-wrap">
      <div class="well-label">your board ↓</div>
      <div class="well">
        <canvas id="boardCanvas"></canvas>
      </div>
    </div>

    <div class="well-wrap">
      <div class="well-label queue">queue →</div>
      <div class="well queue-well">
        <canvas id="queueCanvas"></canvas>
      </div>
    </div>

    <div class="well-wrap">
      <div class="well-label target">match this</div>
      <div class="well">
        <canvas id="targetCanvas"></canvas>
      </div>
    </div>
  </section>

  <div class="hud">
    <div class="stats">
      <div class="stat">
        <div class="stat-label">pieces left</div>
        <div class="stat-value" id="piecesLeft">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">match</div>
        <div class="stat-value" id="matchPct">0%</div>
      </div>
      <div class="stat">
        <div class="stat-label">overflow</div>
        <div class="stat-value" id="overflow">0</div>
      </div>
    </div>

    <div class="controls-hint">
      <kbd>←</kbd> <kbd>→</kbd> move &nbsp;·&nbsp; <kbd>↑</kbd> / <kbd>X</kbd> rotate &nbsp;·&nbsp; <kbd>Z</kbd> rotate ccw<br/>
      <kbd>↓</kbd> soft drop &nbsp;·&nbsp; <kbd>space</kbd> hard drop &nbsp;·&nbsp; <kbd>R</kbd> restart
    </div>

    <div class="buttons">
      <button id="newBtn">new puzzle</button>
      <button id="resetBtn" class="primary">restart</button>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-card" id="modalCard">
    <h2 id="modalTitle">solved!</h2>
    <div class="scribble" id="modalScribble">nicely done</div>
    <p id="modalBody">You matched the silhouette perfectly.</p>
    <button id="modalBtn" class="primary">next puzzle</button>
  </div>
</div>

<script>
// ============================================================
// SILHOUETTE — daily tetris puzzle
// ============================================================

// Difficulty tiers — each defines board size, piece count, cell size,
// and which information aids the player gets to see.
const DIFFICULTIES = {
  easy: {
    label: 'easy',
    cols: 8, rows: 12, cell: 32,
    pieceMin: 5, pieceMax: 6,
    showOutline: true,        // dashed silhouette traced on player board
    showSilhouette: true,     // gray silhouette on right
    silhouettePeekMs: null,   // never hides
    showGhost: true,          // drop-position preview under active piece
    showQueue: true,
    overhangs: false,         // generator avoids overhangs
  },
  medium: {
    label: 'medium',
    cols: 9, rows: 14, cell: 28,
    pieceMin: 8, pieceMax: 10,
    showOutline: false,
    showSilhouette: true,
    silhouettePeekMs: null,
    showGhost: true,
    showQueue: true,
    overhangs: false,
  },
  hard: {
    label: 'hard',
    cols: 10, rows: 16, cell: 24,
    pieceMin: 12, pieceMax: 15,
    showOutline: false,
    showSilhouette: true,
    silhouettePeekMs: 5000,   // peek for 5s then hide forever
    showGhost: false,         // no drop preview
    showQueue: true,
    overhangs: false,         // disabled: would make puzzle unsolvable by gravity drops
  },
};

let difficulty = 'medium';
let cfg = DIFFICULTIES[difficulty];

// Dynamic dimensions — read these via cfg.cols, cfg.rows, cfg.cell
// Kept as helpers in case some old code paths still use bare names
let COLS = cfg.cols;
let ROWS = cfg.rows;
let CELL = cfg.cell;

// Tetromino shapes — using rotation states (SRS-lite)
const PIECES = {
  I: { color: '--c-I', rotations: [
    [[0,1],[1,1],[2,1],[3,1]],
    [[2,0],[2,1],[2,2],[2,3]],
    [[0,2],[1,2],[2,2],[3,2]],
    [[1,0],[1,1],[1,2],[1,3]],
  ]},
  O: { color: '--c-O', rotations: [
    [[1,0],[2,0],[1,1],[2,1]],
    [[1,0],[2,0],[1,1],[2,1]],
    [[1,0],[2,0],[1,1],[2,1]],
    [[1,0],[2,0],[1,1],[2,1]],
  ]},
  T: { color: '--c-T', rotations: [
    [[1,0],[0,1],[1,1],[2,1]],
    [[1,0],[1,1],[2,1],[1,2]],
    [[0,1],[1,1],[2,1],[1,2]],
    [[1,0],[0,1],[1,1],[1,2]],
  ]},
  S: { color: '--c-S', rotations: [
    [[1,0],[2,0],[0,1],[1,1]],
    [[1,0],[1,1],[2,1],[2,2]],
    [[1,1],[2,1],[0,2],[1,2]],
    [[0,0],[0,1],[1,1],[1,2]],
  ]},
  Z: { color: '--c-Z', rotations: [
    [[0,0],[1,0],[1,1],[2,1]],
    [[2,0],[1,1],[2,1],[1,2]],
    [[0,1],[1,1],[1,2],[2,2]],
    [[1,0],[0,1],[1,1],[0,2]],
  ]},
  J: { color: '--c-J', rotations: [
    [[0,0],[0,1],[1,1],[2,1]],
    [[1,0],[2,0],[1,1],[1,2]],
    [[0,1],[1,1],[2,1],[2,2]],
    [[1,0],[1,1],[0,2],[1,2]],
  ]},
  L: { color: '--c-L', rotations: [
    [[2,0],[0,1],[1,1],[2,1]],
    [[1,0],[1,1],[1,2],[2,2]],
    [[0,1],[1,1],[2,1],[0,2]],
    [[0,0],[1,0],[1,1],[1,2]],
  ]},
};
const PIECE_TYPES = Object.keys(PIECES);

// ----------------------------------------------------------------
// Seeded RNG (mulberry32) — same seed produces same puzzle for all
// ----------------------------------------------------------------
function mulberry32(seed) {
  let a = seed;
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = a;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

// Today's puzzle seed — rolls over at midnight America/New_York so every
// player gets the same puzzle on the same "ET day" regardless of local TZ.
function dateSeed(offset = 0) {
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/New_York',
    year: 'numeric', month: '2-digit', day: '2-digit',
  }).formatToParts(new Date());
  const y = +parts.find(p => p.type === 'year').value;
  const m = +parts.find(p => p.type === 'month').value;
  const d = +parts.find(p => p.type === 'day').value;
  // Apply offset in days via a UTC Date (date math), then re-read Y/M/D
  if (offset !== 0) {
    const base = new Date(Date.UTC(y, m - 1, d));
    base.setUTCDate(base.getUTCDate() + offset);
    return base.getUTCFullYear() * 10000 + (base.getUTCMonth() + 1) * 100 + base.getUTCDate();
  }
  return y * 10000 + m * 100 + d;
}

let currentSeed = dateSeed();
let puzzleOffset = 0;

// ----------------------------------------------------------------
// Generate a puzzle: drop random pieces with gravity, then expose
// the resulting silhouette as the target. The piece queue is the
// order they were dropped — player must reach the same silhouette.
//
// Piece selection uses a 7-bag: every 7 draws contains each tetromino
// exactly once, so puzzles never get five S-pieces in a row.
// ----------------------------------------------------------------
function makeBag(rng) {
  let bag = [];
  return function nextPiece() {
    if (bag.length === 0) {
      bag = PIECE_TYPES.slice();
      // Fisher-Yates shuffle using the seeded RNG
      for (let i = bag.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [bag[i], bag[j]] = [bag[j], bag[i]];
      }
    }
    return bag.shift();
  };
}

// Score a candidate puzzle for "interestingness". Higher = more novel.
// Rewards: complex perimeter, wide footprint, varied column heights,
// diverse piece types. Punishes: tiny / single-column / mono-type blobs.
function scorePuzzle({ target, queue }) {
  const rows = target.length, cols = target[0].length;
  let filled = 0, perimeter = 0;
  const colHeights = Array(cols).fill(0);
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (!target[y][x]) continue;
      filled++;
      const h = rows - y;
      if (h > colHeights[x]) colHeights[x] = h;
      for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
        const nx = x + dx, ny = y + dy;
        if (nx < 0 || nx >= cols || ny < 0 || ny >= rows || !target[ny][nx]) perimeter++;
      }
    }
  }
  if (filled === 0) return -Infinity;
  const occupied = colHeights.filter(h => h > 0);
  if (occupied.length < 3) return -Infinity;
  const mean = occupied.reduce((a, b) => a + b, 0) / occupied.length;
  const variance = occupied.reduce((a, h) => a + (h - mean) ** 2, 0) / occupied.length;
  const distinctTypes = new Set(queue.map(q => q.type)).size;
  return perimeter * 1.0
       + occupied.length * 2.0
       + Math.min(variance, 8) * 1.5
       + distinctTypes * 4.0;
}

function generateCandidate(rng) {
  const grid = Array.from({length: cfg.rows}, () => Array(cfg.cols).fill(0));
  const queue = [];
  const targetPieceCount = cfg.pieceMin + Math.floor(rng() * (cfg.pieceMax - cfg.pieceMin + 1));
  const nextPiece = makeBag(rng);

  for (let i = 0; i < targetPieceCount; i++) {
    const type = nextPiece();
    const rot = Math.floor(rng() * 4);
    const shape = PIECES[type].rotations[rot];

    // Candidate placements: every (startX, dropY) that's valid.
    // We then score them and pick one (best for easy, sometimes weird for hard).
    const candidates = [];
    for (let startX = -1; startX < cfg.cols; startX++) {
      const shifted = shape.map(([x, y]) => [x + startX - 1, y]);
      if (shifted.some(([x]) => x < 0 || x >= cfg.cols)) continue;
      const dropY = findDropY(grid, shifted);
      if (dropY === null) continue;

      // Compute candidate stats
      const cells = shifted.map(([sx, sy]) => [sx, sy + dropY]);
      const maxY = Math.max(...cells.map(c => c[1]));
      // Lower maxY = piece sits higher on board = bumpier silhouette
      // Higher maxY = piece settles near floor = flatter silhouette
      candidates.push({ shifted, dropY, cells, height: cfg.rows - maxY });
    }
    if (candidates.length === 0) break;

    // Easy: prefer the flattest options (closest to floor, low max-height).
    // Medium: anything goes.
    // Hard: occasionally place a piece *higher* than its drop position to
    // create overhangs — only if it still touches existing structure.
    let chosen;
    if (cfg.overhangs && rng() < 0.35 && i > 0) {
      // Try to find an overhang placement: lift the piece N rows above dropY
      // as long as at least one cell touches a side-neighbor that's filled.
      const liftable = [];
      for (const c of candidates) {
        for (let lift = 1; lift <= 3; lift++) {
          const liftedCells = c.cells.map(([x, y]) => [x, y - lift]);
          // Must stay on board
          if (liftedCells.some(([x, y]) => y < 0 || y >= cfg.rows || x < 0 || x >= cfg.cols)) continue;
          // None of the lifted cells may overlap existing blocks
          if (liftedCells.some(([x, y]) => grid[y][x])) continue;
          // Must touch existing structure on at least one side or below
          // (we already know nothing is directly below if lift > 0)
          let touches = false;
          for (const [x, y] of liftedCells) {
            // Side neighbors must be other lifted cells OR existing structure
            const neighbors = [[x-1,y],[x+1,y],[x,y+1]];
            for (const [nx, ny] of neighbors) {
              if (nx < 0 || nx >= cfg.cols || ny < 0 || ny >= cfg.rows) continue;
              if (grid[ny][nx]) { touches = true; break; }
            }
            if (touches) break;
          }
          if (touches) {
            liftable.push({ cells: liftedCells });
            break;
          }
        }
      }
      if (liftable.length > 0) {
        chosen = liftable[Math.floor(rng() * liftable.length)];
      }
    }

    if (!chosen) {
      if (!cfg.overhangs) {
        // Easy: bias toward the flattest placements (lowest "height")
        candidates.sort((a, b) => a.height - b.height);
        const top = candidates.slice(0, Math.max(1, Math.ceil(candidates.length * 0.4)));
        chosen = top[Math.floor(rng() * top.length)];
      } else {
        chosen = candidates[Math.floor(rng() * candidates.length)];
      }
    }

    for (const [x, y] of chosen.cells) {
      if (y >= 0 && y < cfg.rows && x >= 0 && x < cfg.cols) grid[y][x] = type;
    }
    queue.push({ type, rotation: rot });
  }

  return { target: grid, queue };
}

// Generate several candidates from the seeded RNG stream and return the
// one with the best novelty score. Deterministic: same seed → same pick.
function generatePuzzle(seed) {
  const rng = mulberry32(seed);
  const CANDIDATES = 8;
  let best = null, bestScore = -Infinity;
  for (let i = 0; i < CANDIDATES; i++) {
    const cand = generateCandidate(rng);
    const s = scorePuzzle(cand);
    if (s > bestScore) { bestScore = s; best = cand; }
  }
  return best;
}

function findDropY(grid, shape) {
  // shape coords are relative; find lowest y where they all fit on the grid
  let y = -3;
  while (y < cfg.rows) {
    let collides = false;
    for (const [sx, sy] of shape) {
      const gy = sy + y + 1;
      const gx = sx;
      if (gy >= cfg.rows) { collides = true; break; }
      if (gy >= 0 && grid[gy][gx]) { collides = true; break; }
    }
    if (collides) {
      // Place at current y
      for (const [sx, sy] of shape) {
        const gy = sy + y;
        if (gy < 0) return null; // wouldn't fit
      }
      return y;
    }
    y++;
  }
  return y;
}

// ----------------------------------------------------------------
// Game state
// ----------------------------------------------------------------
let puzzle, target, queue;
let board, queueIdx;
let active = null; // { type, rotation, x, y }
let gameOver = false;
let won = false;
let silhouetteHidden = false; // hard mode: true after peek elapses
let peekTimer = null;
let peekDeadline = null;
let peekAnimFrame = null;

function applyDifficulty(name) {
  difficulty = name;
  cfg = DIFFICULTIES[name];
  COLS = cfg.cols;
  ROWS = cfg.rows;
  CELL = cfg.cell;
  // Resize canvases for new dimensions
  boardCanvas.width = COLS * CELL;
  boardCanvas.height = ROWS * CELL;
  targetCanvas.width = COLS * CELL;
  targetCanvas.height = ROWS * CELL;
  queueCanvas.height = ROWS * CELL;
  // Update active tab UI
  document.querySelectorAll('.diff-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.diff === name);
  });
}

function loadPuzzle() {
  // Cancel any in-flight peek timer from a previous puzzle
  if (peekTimer) { clearTimeout(peekTimer); peekTimer = null; }
  if (peekAnimFrame) { cancelAnimationFrame(peekAnimFrame); peekAnimFrame = null; }
  peekDeadline = null;

  puzzle = generatePuzzle(currentSeed + puzzleOffset);
  target = puzzle.target;
  queue = puzzle.queue;
  board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  queueIdx = 0;
  gameOver = false;
  won = false;

  // Hard mode: silhouette is visible for the peek window, then hidden forever
  if (cfg.silhouettePeekMs) {
    silhouetteHidden = false;
    peekDeadline = performance.now() + cfg.silhouettePeekMs;
    peekTimer = setTimeout(() => {
      silhouetteHidden = true;
      peekTimer = null;
      peekDeadline = null;
      render();
    }, cfg.silhouettePeekMs);
    // Animate the countdown ring
    const tickPeek = () => {
      if (peekDeadline == null) return;
      render();
      peekAnimFrame = requestAnimationFrame(tickPeek);
    };
    peekAnimFrame = requestAnimationFrame(tickPeek);
  } else {
    silhouetteHidden = false;
  }

  spawnNext();
  updateHUD();
  render();
}

function spawnNext() {
  if (queueIdx >= queue.length) {
    active = null;
    gameOver = true;
    checkWin();
    return;
  }
  const { type, rotation } = queue[queueIdx];
  active = {
    type,
    rotation: 0, // player chooses rotation; we don't impose generator's choice
    x: Math.floor(COLS / 2) - 2,
    y: -1,
  };
  // If can't even spawn, game over
  if (collides(active.x, active.y, active.rotation)) {
    active = null;
    gameOver = true;
    checkWin();
  }
}

function getShape(piece) {
  return PIECES[piece.type].rotations[piece.rotation];
}

function collides(x, y, rotation) {
  const shape = PIECES[active.type].rotations[rotation];
  for (const [sx, sy] of shape) {
    const gx = sx + x;
    const gy = sy + y;
    if (gx < 0 || gx >= COLS || gy >= ROWS) return true;
    if (gy >= 0 && board[gy][gx]) return true;
  }
  return false;
}

function lockPiece() {
  const shape = getShape(active);
  for (const [sx, sy] of shape) {
    const gx = sx + active.x;
    const gy = sy + active.y;
    if (gy >= 0 && gy < ROWS && gx >= 0 && gx < COLS) {
      board[gy][gx] = active.type;
    }
  }
  queueIdx++;
  spawnNext();
  updateHUD();
}

function hardDrop() {
  if (!active) return;
  while (!collides(active.x, active.y + 1, active.rotation)) {
    active.y++;
  }
  lockPiece();
  render();
}

function softDrop() {
  if (!active) return;
  if (!collides(active.x, active.y + 1, active.rotation)) {
    active.y++;
  } else {
    lockPiece();
  }
  render();
}

function move(dx) {
  if (!active) return;
  if (!collides(active.x + dx, active.y, active.rotation)) {
    active.x += dx;
    render();
  }
}

function rotate(dir) {
  if (!active) return;
  const newRot = (active.rotation + dir + 4) % 4;
  // Simple wall kicks: try shifts ±1, ±2
  const kicks = [0, -1, 1, -2, 2];
  for (const k of kicks) {
    if (!collides(active.x + k, active.y, newRot)) {
      active.x += k;
      active.rotation = newRot;
      render();
      return;
    }
  }
}

// ----------------------------------------------------------------
// Scoring: match % between board and target silhouette
// ----------------------------------------------------------------
function computeStats() {
  let targetCells = 0, boardCells = 0, matched = 0, overflow = 0;
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const t = target[y][x] ? 1 : 0;
      const b = board[y][x] ? 1 : 0;
      if (t) targetCells++;
      if (b) boardCells++;
      if (t && b) matched++;
      if (b && !t) overflow++;
    }
  }
  const pct = targetCells === 0 ? 0 : Math.round((matched / targetCells) * 100);
  return { pct, overflow, matched, targetCells, boardCells };
}

function checkWin() {
  const s = computeStats();
  if (s.pct === 100 && s.overflow === 0) {
    won = true;
    silhouetteHidden = false; // reveal on victory
    render();
    showModal(true);
  } else if (gameOver) {
    silhouetteHidden = false; // reveal on failure too — let them see what they missed
    render();
    showModal(false);
  }
}

function updateHUD() {
  document.getElementById('piecesLeft').textContent =
    Math.max(0, queue.length - queueIdx);
  const s = computeStats();
  const pctEl = document.getElementById('matchPct');
  pctEl.textContent = s.pct + '%';
  pctEl.className = 'stat-value' + (s.pct === 100 && s.overflow === 0 ? ' match' : '');
  const ovEl = document.getElementById('overflow');
  ovEl.textContent = s.overflow;
  ovEl.className = 'stat-value' + (s.overflow > 0 ? ' over' : '');
}

// ----------------------------------------------------------------
// Rendering
// ----------------------------------------------------------------
const boardCanvas = document.getElementById('boardCanvas');
const queueCanvas = document.getElementById('queueCanvas');
const targetCanvas = document.getElementById('targetCanvas');
const bctx = boardCanvas.getContext('2d');
const qctx = queueCanvas.getContext('2d');
const tctx = targetCanvas.getContext('2d');

// Canvas dimensions are set by applyDifficulty() — only queue width is fixed
const QUEUE_CELL = 14;
queueCanvas.width = 5 * QUEUE_CELL;

function getCssColor(varName) {
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

function drawCell(ctx, x, y, color, size = CELL, opts = {}) {
  const px = x * size;
  const py = y * size;
  // Main fill
  ctx.fillStyle = color;
  ctx.fillRect(px + 1, py + 1, size - 2, size - 2);
  // Top/left highlight
  if (!opts.flat) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
    ctx.fillRect(px + 1, py + 1, size - 2, 3);
    ctx.fillRect(px + 1, py + 1, 3, size - 2);
    // Bottom/right shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
    ctx.fillRect(px + 1, py + size - 4, size - 2, 3);
    ctx.fillRect(px + size - 4, py + 1, 3, size - 2);
  }
  // Subtle border
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(px + 0.5, py + 0.5, size - 1, size - 1);
}

function drawGridLines(ctx, cols, rows, size) {
  ctx.strokeStyle = getCssColor('--grid-line');
  ctx.lineWidth = 1;
  for (let x = 1; x < cols; x++) {
    ctx.beginPath();
    ctx.moveTo(x * size + 0.5, 0);
    ctx.lineTo(x * size + 0.5, rows * size);
    ctx.stroke();
  }
  for (let y = 1; y < rows; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * size + 0.5);
    ctx.lineTo(cols * size, y * size + 0.5);
    ctx.stroke();
  }
}

// Draw a dashed outline tracing the perimeter of the target silhouette.
// For each filled target cell, draw any edge whose neighbor is empty (or out of bounds).
function drawTargetOutline(ctx, size) {
  ctx.save();
  ctx.strokeStyle = 'rgba(20, 20, 20, 0.55)';
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 4]);
  ctx.lineCap = 'round';

  const isTarget = (x, y) =>
    x >= 0 && x < COLS && y >= 0 && y < ROWS && target[y][x];

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (!target[y][x]) continue;
      const px = x * size;
      const py = y * size;
      // Top edge
      if (!isTarget(x, y - 1)) {
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px + size, py);
        ctx.stroke();
      }
      // Bottom edge
      if (!isTarget(x, y + 1)) {
        ctx.beginPath();
        ctx.moveTo(px, py + size);
        ctx.lineTo(px + size, py + size);
        ctx.stroke();
      }
      // Left edge
      if (!isTarget(x - 1, y)) {
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px, py + size);
        ctx.stroke();
      }
      // Right edge
      if (!isTarget(x + 1, y)) {
        ctx.beginPath();
        ctx.moveTo(px + size, py);
        ctx.lineTo(px + size, py + size);
        ctx.stroke();
      }
    }
  }
  ctx.restore();
}

function renderBoard() {
  bctx.fillStyle = getCssColor('--paper');
  bctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
  drawGridLines(bctx, COLS, ROWS, CELL);

  // Dashed target silhouette overlay on the player's board (easy only)
  if (cfg.showOutline) {
    drawTargetOutline(bctx, CELL);
  }

  // Locked pieces
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (board[y][x]) {
        const c = getCssColor(PIECES[board[y][x]].color);
        drawCell(bctx, x, y, c);
      }
    }
  }

  // Ghost piece + active piece
  if (active) {
    const shape = getShape(active);
    const color = getCssColor(PIECES[active.type].color);

    // Ghost (skipped in hard mode)
    if (cfg.showGhost) {
      let ghostY = active.y;
      while (!collides(active.x, ghostY + 1, active.rotation)) ghostY++;
      for (const [sx, sy] of shape) {
        const gx = sx + active.x;
        const gy = sy + ghostY;
        if (gy >= 0 && gy < ROWS && gx >= 0 && gx < COLS) {
          bctx.fillStyle = color;
          bctx.globalAlpha = 0.18;
          bctx.fillRect(gx * CELL + 2, gy * CELL + 2, CELL - 4, CELL - 4);
          bctx.globalAlpha = 1;
          bctx.strokeStyle = color;
          bctx.lineWidth = 1.5;
          bctx.setLineDash([3, 3]);
          bctx.strokeRect(gx * CELL + 2, gy * CELL + 2, CELL - 4, CELL - 4);
          bctx.setLineDash([]);
        }
      }
    }

    // Draw active piece
    for (const [sx, sy] of shape) {
      const gx = sx + active.x;
      const gy = sy + active.y;
      if (gy >= 0 && gy < ROWS && gx >= 0 && gx < COLS) {
        drawCell(bctx, gx, gy, color);
      }
    }
  }
}

function renderTarget() {
  tctx.fillStyle = getCssColor('--paper');
  tctx.fillRect(0, 0, targetCanvas.width, targetCanvas.height);
  drawGridLines(tctx, COLS, ROWS, CELL);

  // If silhouette is hidden (hard mode after peek), draw a "?" pattern instead
  if (silhouetteHidden) {
    tctx.save();
    tctx.fillStyle = 'rgba(20, 20, 20, 0.04)';
    // Subtle diagonal hatch to indicate "covered"
    for (let i = -ROWS; i < COLS + ROWS; i += 1) {
      tctx.fillRect(i * CELL, 0, 2, ROWS * CELL);
    }
    tctx.restore();

    tctx.save();
    tctx.fillStyle = 'rgba(20, 20, 20, 0.35)';
    tctx.font = `bold ${CELL * 2}px Fraunces, serif`;
    tctx.textAlign = 'center';
    tctx.textBaseline = 'middle';
    tctx.fillText('?', targetCanvas.width / 2, targetCanvas.height / 2 - CELL);
    tctx.font = `${CELL * 0.5}px JetBrains Mono, monospace`;
    tctx.fillStyle = 'rgba(20, 20, 20, 0.5)';
    tctx.fillText('from memory', targetCanvas.width / 2, targetCanvas.height / 2 + CELL);
    tctx.restore();
    return;
  }

  // Draw silhouette as solid gray with a slightly varied tone for piece boundaries
  const targetColor = getCssColor('--target');
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (target[y][x]) {
        const px = x * CELL;
        const py = y * CELL;
        tctx.fillStyle = targetColor;
        tctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
        // tiny dot at center to give that "gray with texture" feel from the sketch
        tctx.fillStyle = 'rgba(255,255,255,0.18)';
        tctx.fillRect(px + CELL/2 - 1, py + CELL/2 - 1, 2, 2);
      }
    }
  }

  // Peek countdown overlay (hard mode while silhouette is still showing)
  if (peekDeadline !== null) {
    const remaining = Math.max(0, peekDeadline - performance.now());
    const total = cfg.silhouettePeekMs;
    const pct = remaining / total;

    // Big number top-right
    tctx.save();
    const seconds = Math.ceil(remaining / 1000);
    const pad = 12;
    const r = 22;
    const cx = targetCanvas.width - r - pad;
    const cy = r + pad;
    // Ring background
    tctx.beginPath();
    tctx.arc(cx, cy, r, 0, Math.PI * 2);
    tctx.fillStyle = 'rgba(251, 247, 239, 0.95)';
    tctx.fill();
    tctx.strokeStyle = 'rgba(20, 20, 20, 0.2)';
    tctx.lineWidth = 3;
    tctx.stroke();
    // Ring progress
    tctx.beginPath();
    tctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct);
    tctx.strokeStyle = getCssColor('--accent');
    tctx.lineWidth = 3;
    tctx.stroke();
    // Number
    tctx.fillStyle = getCssColor('--ink');
    tctx.font = 'bold 18px JetBrains Mono, monospace';
    tctx.textAlign = 'center';
    tctx.textBaseline = 'middle';
    tctx.fillText(seconds, cx, cy);
    tctx.restore();
  }
}

function renderQueue() {
  qctx.fillStyle = getCssColor('--paper');
  qctx.fillRect(0, 0, queueCanvas.width, queueCanvas.height);

  // Show upcoming pieces stacked vertically, starting with NEXT at top
  const upcoming = queue.slice(queueIdx + 1, queueIdx + 8);
  const slotH = 38;
  for (let i = 0; i < upcoming.length; i++) {
    const { type } = upcoming[i];
    const shape = PIECES[type].rotations[0];
    const color = getCssColor(PIECES[type].color);

    // Find shape bounds
    const xs = shape.map(([x]) => x);
    const ys = shape.map(([_, y]) => y);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const w = maxX - minX + 1;
    const h = maxY - minY + 1;

    const offsetX = (5 - w) * QUEUE_CELL / 2 - minX * QUEUE_CELL;
    const offsetY = i * slotH + (slotH - h * QUEUE_CELL) / 2 - minY * QUEUE_CELL + 8;

    for (const [sx, sy] of shape) {
      qctx.fillStyle = color;
      qctx.fillRect(offsetX + sx * QUEUE_CELL + 1, offsetY + sy * QUEUE_CELL + 1,
                    QUEUE_CELL - 2, QUEUE_CELL - 2);
      qctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      qctx.fillRect(offsetX + sx * QUEUE_CELL + 1, offsetY + sy * QUEUE_CELL + 1,
                    QUEUE_CELL - 2, 2);
      qctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
      qctx.fillRect(offsetX + sx * QUEUE_CELL + 1, offsetY + sy * QUEUE_CELL + QUEUE_CELL - 3,
                    QUEUE_CELL - 2, 2);
      qctx.strokeStyle = 'rgba(0,0,0,0.4)';
      qctx.lineWidth = 1;
      qctx.strokeRect(offsetX + sx * QUEUE_CELL + 0.5, offsetY + sy * QUEUE_CELL + 0.5,
                      QUEUE_CELL - 1, QUEUE_CELL - 1);
    }
  }
}

function render() {
  renderBoard();
  renderTarget();
  renderQueue();
  updateHUD();
}

// ----------------------------------------------------------------
// Input
// ----------------------------------------------------------------
window.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R' || e.code === 'KeyR') {
    e.preventDefault();
    if (document.activeElement && document.activeElement.blur) {
      document.activeElement.blur();
    }
    const btn = document.getElementById('resetBtn');
    if (btn) btn.click();
    return;
  }
  if (gameOver) return;
  switch (e.key) {
    case 'ArrowLeft': e.preventDefault(); move(-1); break;
    case 'ArrowRight': e.preventDefault(); move(1); break;
    case 'ArrowDown': e.preventDefault(); softDrop(); break;
    case 'ArrowUp':
    case 'x':
    case 'X': e.preventDefault(); rotate(1); break;
    case 'z':
    case 'Z': e.preventDefault(); rotate(-1); break;
    case ' ': e.preventDefault(); hardDrop(); break;
  }
});

// ----------------------------------------------------------------
// Modal
// ----------------------------------------------------------------
const modal = document.getElementById('modal');
const modalCard = document.getElementById('modalCard');
const modalTitle = document.getElementById('modalTitle');
const modalScribble = document.getElementById('modalScribble');
const modalBody = document.getElementById('modalBody');
const modalBtn = document.getElementById('modalBtn');

function showModal(success) {
  if (success) {
    modalCard.classList.remove('fail');
    modalTitle.textContent = 'solved!';
    modalScribble.textContent = 'beautifully matched';
    modalBody.textContent = 'You rebuilt the silhouette perfectly. Come back tomorrow for a new puzzle.';
    modalBtn.textContent = 'try another';
  } else {
    modalCard.classList.add('fail');
    const s = computeStats();
    modalTitle.textContent = 'no match';
    modalScribble.textContent = 'so close';
    modalBody.textContent = `You matched ${s.pct}% with ${s.overflow} overflow cells. Try again?`;
    modalBtn.textContent = 'try again';
  }
  modal.classList.add('show');
}

modalBtn.addEventListener('click', () => {
  modal.classList.remove('show');
  if (won) {
    puzzleOffset++;
    document.getElementById('puzzleNo').textContent =
      'PUZZLE #' + String(1 + puzzleOffset).padStart(3, '0');
  }
  loadPuzzle();
});

modal.addEventListener('click', (e) => {
  if (e.target === modal) modal.classList.remove('show');
});

// ----------------------------------------------------------------
// Buttons
// ----------------------------------------------------------------
document.getElementById('resetBtn').addEventListener('click', () => {
  modal.classList.remove('show');
  loadPuzzle();
});

document.getElementById('newBtn').addEventListener('click', () => {
  puzzleOffset++;
  document.getElementById('puzzleNo').textContent =
    'PUZZLE #' + String(1 + puzzleOffset).padStart(3, '0');
  modal.classList.remove('show');
  loadPuzzle();
});

// Difficulty buttons — switching loads a fresh puzzle at the new size
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const diff = btn.dataset.diff;
    if (diff === difficulty) return;
    modal.classList.remove('show');
    applyDifficulty(diff);
    loadPuzzle();
  });
});

// ----------------------------------------------------------------
// Boot
// ----------------------------------------------------------------
const today = new Date();
document.getElementById('dateLine').textContent =
  today.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

applyDifficulty('medium');
loadPuzzle();
</script>
